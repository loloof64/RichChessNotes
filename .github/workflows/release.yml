name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_NAME: rich_chess_notes

jobs:
  build-linux:
    name: Build Linux AppImage
    # Build on the oldest available Ubuntu runner to link against an older
    # glibc, maximizing AppImage compatibility with older distros.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libasound2-dev \
            librsvg2-dev gobject-introspection libgirepository1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Bundle flutter_soloud native libraries
        # flutter_soloud's CMakeLists links against its vendored libFLAC/opus/ogg/vorbis
        # libraries but doesn't declare PLUGIN_BUNDLED_LIBRARIES, so flutter build never
        # copies them into the bundle. Without this, the app fails at runtime with
        # "cannot open shared object file" for these libs.
        run: |
          cp linux/flutter/ephemeral/.plugin_symlinks/flutter_soloud/linux/libs/*.so* \
            build/linux/x64/release/bundle/lib/

      - name: Package AppImage
        run: |
          set -e
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r build/linux/x64/release/bundle/* "$APPDIR/usr/bin/"

          cp web/icons/Icon-512.png "$APPDIR/${APP_NAME}.png"

          cat > "$APPDIR/${APP_NAME}.desktop" <<EOF
          [Desktop Entry]
          Name=Rich Chess Notes
          Exec=${APP_NAME}
          Icon=${APP_NAME}
          Type=Application
          Categories=Utility;
          EOF

          # Use linuxdeploy (+ its GTK plugin) instead of raw appimagetool so that
          # system shared libraries required at runtime (e.g. libwebkit2gtk,
          # GTK/GIO modules, gdk-pixbuf loaders) are actually bundled into the
          # AppImage. A plain `appimagetool` run only zips up the Flutter bundle
          # and relies on the target system already having these libraries
          # installed, which isn't guaranteed (e.g. Fedora Workstation doesn't
          # ship webkit2gtk-4.1 by default).
          wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          # The GTK plugin no longer ships as an AppImage release asset, only
          # as this shell script on the default branch.
          wget -O linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

          # Flutter plugins (e.g. flutter_soloud, url_launcher_linux) are dlopen'd
          # at runtime rather than linked into the main executable, so linuxdeploy
          # won't discover them (and their own dependencies) unless listed
          # explicitly.
          LIBRARY_ARGS=()
          for lib in "$APPDIR/usr/bin/lib"/*.so*; do
            LIBRARY_ARGS+=(--library "$lib")
          done

          export DEPLOY_GTK_VERSION=3
          export PATH="$PWD:$PATH"
          ./linuxdeploy --appimage-extract-and-run \
            --appdir "$APPDIR" \
            --executable "$APPDIR/usr/bin/${APP_NAME}" \
            --desktop-file "$APPDIR/${APP_NAME}.desktop" \
            --icon-file "$APPDIR/${APP_NAME}.png" \
            "${LIBRARY_ARGS[@]}" \
            --plugin gtk \
            --output appimage

          VERSION="${GITHUB_REF_NAME:-dev}"
          mv ./*.AppImage "${APP_NAME}_${VERSION}_amd64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"
          if-no-files-found: error

  build-windows:
    name: Build Windows zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package zip
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $zipName = "${env:APP_NAME}_${version}_windows64.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $zipName

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "*.zip"
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_message.md
          files: artifacts/*
