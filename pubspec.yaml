name: rich_chess_notes
description: "A rich chess notes organizer"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.12
  markdown: ^7.3.1
  simple_chess_board: ^1.12.0
  yaml: ^3.1.3
  chess_vectors_flutter: ^1.0.7
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  oauth2_client: ^4.3.2
  path: ^1.9.1
  path_provider: ^2.1.6
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  diacritic: ^0.1.6
  crypto: ^3.0.7
  equatable: ^2.1.0
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  remix_icons_flutter: ^4.9.3+1
  flex_color_scheme: ^8.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
